name: "ASP.NET Core Web API Skill Evaluation"
description: >
  Evaluate how custom Copilot skills impact the quality of generated
  ASP.NET Core Web API code across three realistic application scenarios.
runs: 1

scenarios:
  - name: FitnessStudioApi
    prompt: prompts/scenarios/fitness-studio.prompt.md
    description: "Booking/membership system with class scheduling, waitlists, and instructor management"
  - name: LibraryApi
    prompt: prompts/scenarios/library.prompt.md
    description: "Book loans, reservations, overdue fines, and availability tracking"
  - name: VetClinicApi
    prompt: prompts/scenarios/vet-clinic.prompt.md
    description: "Pet healthcare with appointments, vaccinations, and medical records"

configurations:
  - name: no-skills
    label: "Baseline (default Copilot)"
    skills: []
    plugins: []
  - name: dotnet-webapi
    label: "dotnet-webapi skill"
    skills:
      - skills/dotnet-webapi
    plugins: []
  - name: dotnet-artisan
    label: "dotnet-artisan plugin chain"
    skills: []
    plugins:
      - plugins/dotnet-artisan
  - name: managedcode-dotnet-skills
    label: "Community managed-code skills"
    skills:
      - skills/managedcode-dotnet-skills
    plugins: []
  - name: dotnet-skills
    label: "Official .NET Skills (dotnet/skills)"
    skills: []
    plugins:
      - plugins/dotnet-skills/dotnet
      - plugins/dotnet-skills/dotnet-ai
      - plugins/dotnet-skills/dotnet-data
      - plugins/dotnet-skills/dotnet-diag
      - plugins/dotnet-skills/dotnet-experimental
      - plugins/dotnet-skills/dotnet-maui
      - plugins/dotnet-skills/dotnet-msbuild
      - plugins/dotnet-skills/dotnet-nuget
      - plugins/dotnet-skills/dotnet-template-engine
      - plugins/dotnet-skills/dotnet-test
      - plugins/dotnet-skills/dotnet-upgrade

verification:
  build:
    command: "dotnet build"
    success_pattern: "Build succeeded"
  format:
    command: "dotnet format --check"
  security:
    vulnerability_scan: true
  analyzers:
    - "Meziantou.Analyzer"
  run:
    command: "dotnet run"
    timeout_seconds: 15

dimensions:
  # ============================================================
  # CRITICAL TIER (weight 3x) - Must-have quality gates
  # ============================================================

  - name: "Build & Run Success"
    description: "Whether the generated project compiles without errors and the app starts successfully"
    what_to_look_for: |
      Check if dotnet build completes with zero errors and the success pattern
      "Build succeeded" appears in the output. Check if dotnet run starts the
      app and it remains running for the configured timeout period. Note the
      total number of build warnings as a secondary quality signal.
    why_it_matters: "A project that does not build or run is completely unusable - this is the most fundamental quality gate"
    tier: critical
    evaluation_method: automated

  - name: "Security Vulnerability Scan"
    description: "Known NuGet vulnerabilities and insecure package versions"
    what_to_look_for: |
      Run dotnet list package --vulnerable. Check for packages with known CVEs.
      Check for deprecated packages. Verify no development-only packages are
      included unnecessarily.
    why_it_matters: "Vulnerable dependencies are the most common attack vector in production .NET apps"
    tier: critical
    evaluation_method: automated

  - name: "Minimal API Architecture"
    description: "Use of Minimal APIs with route groups, TypedResults, and endpoint extension methods"
    what_to_look_for: |
      Check Program.cs and endpoint files for MapGet/MapPost/MapPut/MapDelete (Minimal API)
      vs [ApiController] decorated classes (controllers). Controllers should NOT be present.
      Check for MapGroup() calls that group related endpoints by resource with shared filters,
      tags, and route prefixes applied at the group level. Look for endpoint extension methods
      that keep Program.cs clean (e.g., static MapBookingEndpoints(this RouteGroupBuilder group)).
      Check if endpoints return TypedResults.Ok(), TypedResults.NotFound(), TypedResults.Created()
      vs Results.Ok(), Results.NotFound(). Look for Results<T1, T2> union return types on
      endpoint method signatures that enable automatic OpenAPI schema generation.
    why_it_matters: "Minimal APIs with route groups and TypedResults are the modern .NET standard - they have lower overhead, produce more concise code, and provide compile-time type safety with automatic OpenAPI schema generation"
    tier: critical

  - name: "Input Validation & Guard Clauses"
    description: "Comprehensive input validation on all user-facing endpoints and guard clauses at service boundaries"
    what_to_look_for: |
      Check all POST/PUT endpoint parameters and request DTOs for validation attributes
      ([Required], [StringLength], [Range], [RegularExpression]) or equivalent validation logic.
      Check that validation errors return ProblemDetails (400). Verify no raw user input reaches
      database queries without validation. Check constructors and public service methods for
      argument validation using ArgumentNullException.ThrowIfNull(),
      ArgumentException.ThrowIfNullOrEmpty(), or ArgumentOutOfRangeException.ThrowIfNegative().
      Look for fail-fast patterns that validate inputs before performing work. Note if guard
      clauses are consistently applied on DI-injected constructor parameters.
    why_it_matters: "Missing input validation enables injection attacks and data corruption; guard clauses catch invalid inputs early and follow .NET exception design guidelines for fail-fast behavior"
    tier: critical
    evaluation_method: hybrid

  - name: "NuGet & Package Discipline"
    description: "Exact version pinning and minimal, purposeful NuGet package selection"
    what_to_look_for: |
      Check .csproj files for PackageReference elements. Every package must have a specific
      version number (e.g., Version="9.0.0"). No package should use Version="*" or floating
      version ranges - using * is the worst case as it can pull in breaking changes or
      vulnerable releases. Also check for unnecessary packages such as
      Microsoft.AspNetCore.Mvc.Razor.RuntimeCompilation, or packages that duplicate framework
      capabilities. Count total package references vs what is functionally required.
    why_it_matters: "Wildcard versions cause non-reproducible builds and may pull in vulnerable packages; unnecessary dependencies increase attack surface and maintenance burden"
    tier: critical
    evaluation_method: hybrid

  - name: "EF Migration Usage"
    description: "Whether EF Core migrations are used instead of the EnsureCreated anti-pattern"
    what_to_look_for: |
      Check Program.cs for calls to context.Database.EnsureCreated() or
      EnsureCreatedAsync(). This bypasses EF Core migrations and should not
      be used. Instead, the app should use EF Core migrations (dotnet ef
      migrations add, context.Database.Migrate() or MigrateAsync()). Using
      EnsureCreated makes it impossible to evolve the schema safely.
    why_it_matters: "EnsureCreated bypasses migrations, making schema evolution impossible and causing data loss on model changes - migrations are the only production-safe approach"
    tier: critical

  # ============================================================
  # HIGH TIER (weight 2x) - Important best practices
  # ============================================================

  - name: "Business Logic Correctness"
    description: "Whether all specified endpoints exist and business rules from the specification are correctly implemented"
    what_to_look_for: |
      Compare the list of endpoints specified in the scenario prompt against the actual
      routes registered in Program.cs or mapped via endpoint extension methods. Count
      missing endpoints and check that HTTP methods match the spec. For each business
      rule in the scenario prompt, check if there is corresponding validation or logic
      in the service or endpoint layer. Look for boundary checks (capacity limits, date
      ranges), state transition guards (booking states, membership status), constraint
      enforcement (waitlist promotion, fine calculation), and business rule error responses.
      Note any rules or endpoints completely missing from the implementation.
    why_it_matters: "Business rules and endpoint completeness define the app's purpose - code that compiles but does not implement the specification is functionally incorrect"
    tier: high
    evaluation_method: llm

  - name: "Prefer Built-in over 3rd Party"
    description: "Use of built-in .NET capabilities instead of third-party libraries when equivalent functionality exists"
    what_to_look_for: |
      Check .csproj for Swashbuckle packages (Swashbuckle.AspNetCore, etc.) - the app should
      use built-in OpenAPI support (AddOpenApi()/MapOpenApi()) instead. Check for Newtonsoft.Json
      - the app should use System.Text.Json unless a specific Newtonsoft feature is required.
      Check for Autofac or other DI containers - the built-in Microsoft.Extensions.DependencyInjection
      should be used. Check for Serilog/NLog - the built-in ILogger<T> infrastructure should be
      the default. Check for AutoMapper - manual mapping or simple extension methods are preferred.
      Check Program.cs for app.UseSwagger()/app.UseSwaggerUI() which should not be present.
    why_it_matters: "The .NET team cannot ship examples using third-party libraries when built-in alternatives exist - this signals outdated practices, adds unnecessary dependencies, and undermines the built-in platform capabilities"
    tier: high

  - name: "Modern C# Adoption"
    description: "Use of modern C# features including primary constructors, collection expressions, and global usings"
    what_to_look_for: |
      Look for class/record declarations with parameter lists: class MyService(IRepo repo)
      vs traditional private readonly IRepo _repo; public MyService(IRepo repo) { _repo = repo; }
      Search for collection initialization patterns: modern [] (C# 12) vs
      new List<T>() or new List<T> { ... }.
      Check for a GlobalUsings.cs file or global using statements. Look for repetitive
      using statements across files that could be centralized. Note if implicit usings
      are enabled in .csproj via <ImplicitUsings>enable</ImplicitUsings>.
      Check for file-scoped namespaces (namespace X;) vs block-scoped (namespace X { }).
      Look for target-typed new expressions (new() instead of new ClassName()).
    why_it_matters: "Modern C# features reduce boilerplate, improve clarity, and signal current language proficiency - critical for .NET team examples"
    tier: high

  - name: "Error Handling & Middleware"
    description: "Global error handling pipeline with IExceptionHandler, ProblemDetails, and consistent error responses"
    what_to_look_for: |
      Check for IExceptionHandler implementation (modern .NET 8+) vs convention-based middleware
      with RequestDelegate, or try/catch in individual endpoints. Look for custom exception
      classes (e.g., BusinessRuleException, NotFoundException) and how HTTP status codes map
      to exception types. Check that 400 (validation), 404 (not found), and 409 (conflict or
      business rule violation) responses use ProblemDetails format (RFC 7807). Verify error
      messages are informative but do not leak internal details. Look for result/option patterns
      as alternatives to exceptions for expected failures.
    why_it_matters: "IExceptionHandler is composable, DI-aware, and the modern .NET approach; consistent ProblemDetails responses enable clients to handle failures reliably"
    tier: high

  - name: "Async Patterns & Cancellation"
    description: "Correct async/await patterns and CancellationToken propagation through all layers"
    what_to_look_for: |
      Check that all async methods have the Async suffix (GetBookingsAsync, not GetBookings).
      Look for async void methods (should be async Task except for event handlers). Check for
      sync-over-async anti-patterns (Task.Result, .Wait(), .GetAwaiter().GetResult()). Verify
      that async entry points (endpoint handlers) use await consistently through the call chain.
      Check endpoint handlers for CancellationToken parameters. Trace the token through service
      methods to EF Core calls (ToListAsync, SaveChangesAsync). Look for breaks in the chain
      where CancellationToken is accepted but not forwarded.
    why_it_matters: "Proper async patterns prevent deadlocks and thread pool starvation; CancellationToken propagation prevents wasted server resources on cancelled requests"
    tier: high

  - name: "EF Core Best Practices"
    description: "Explicit relationship configuration, AsNoTracking for reads, and proper DbContext usage"
    what_to_look_for: |
      Check for Fluent API relationship configuration vs convention-only. Look for explicit
      cascade delete behavior, required vs optional relationships, and composite keys. Note
      if IEntityTypeConfiguration<T> is used for clean separation of entity configs from
      OnModelCreating. Search for .AsNoTracking() in service/repository files and check if
      read-only queries (GET endpoints) consistently use it. Count total read queries vs
      those using AsNoTracking. Verify DbContext lifetime is managed by DI (not manually
      disposed). Check for proper use of Include/ThenInclude for eager loading.
    why_it_matters: "Explicit relationship configuration prevents surprise cascade behaviors; AsNoTracking doubles performance on read queries; proper DbContext usage prevents connection leaks"
    tier: high

  - name: "Service Abstraction & DI"
    description: "Interface-based services with proper dependency injection registration"
    what_to_look_for: |
      Check DI registration: AddScoped<IService, Service>() vs AddScoped<Service>().
      Look for interface files and their organization. Check that services follow single
      responsibility - one service per domain area rather than a single monolithic service.
      Verify DI lifetimes are appropriate (Scoped for DbContext-dependent services,
      Singleton for stateless utilities). Check that services receive dependencies through
      constructor injection, not service locator pattern.
    why_it_matters: "Interface-based registration enables testability, follows dependency inversion, and is the standard .NET DI pattern"
    tier: high

  - name: "Security Configuration"
    description: "HSTS, HTTPS redirection, and security headers for production readiness"
    what_to_look_for: |
      Check Program.cs for proper HTTPS enforcement. In non-development environments,
      the app should call app.UseHsts() and app.UseHttpsRedirection(). Look for the
      standard pattern: if (!app.Environment.IsDevelopment()) { app.UseHsts(); }
      followed by app.UseHttpsRedirection(). Verify HSTS is not called unconditionally
      (should be conditional on environment). Check for CORS configuration if the API
      is intended to be consumed by browser clients. Look for security-related middleware
      ordering (authentication before authorization).
    why_it_matters: "HSTS and HTTPS redirection protect against man-in-the-middle attacks; proper CORS prevents unauthorized cross-origin access; correct middleware ordering is essential for security"
    tier: high

  # ============================================================
  # MEDIUM TIER (weight 1x) - Good practices
  # ============================================================

  - name: "DTO Design"
    description: "Records vs classes, immutability, naming conventions, and separation from entities"
    what_to_look_for: |
      Check DTO types: are they records or classes? Sealed or not? Look at naming:
      *Request/*Response vs *Dto. Check immutability: positional records, init properties,
      or mutable setters. Verify DTOs are separate from EF Core entities (not exposing
      navigation properties or database concerns to API consumers).
    why_it_matters: "Immutable record DTOs are safer, more expressive, and produce cleaner API contracts; separation from entities prevents over-posting and data leakage"
    tier: medium

  - name: "Sealed Types"
    description: "Whether classes and records are declared sealed for optimization and design intent"
    what_to_look_for: |
      Check all class and record declarations for the 'sealed' modifier. Count sealed vs
      non-sealed across models, DTOs, services, and middleware. Classes that are not
      designed for inheritance should be sealed. Only base classes in an explicit hierarchy
      should remain unsealed.
    why_it_matters: "Sealed types enable JIT devirtualization optimizations, signal design intent, and prevent unintended inheritance"
    tier: medium

  - name: "Data Seeder Design"
    description: "Seed data strategy with realistic, varied data for development and testing"
    what_to_look_for: |
      Check how seed data is created: HasData() in OnModelCreating, static seeder methods
      called from Program.cs, or injectable seeder services. Verify seed data includes
      realistic variety (different states, edge cases, enough records to demonstrate
      pagination). Check for idempotency guards on runtime seeders.
    why_it_matters: "HasData() integrates with migrations for reproducible state; realistic seed data demonstrates the app's full capabilities"
    tier: medium

  - name: "Structured Logging"
    description: "ILogger<T> with structured message templates and proper log levels"
    what_to_look_for: |
      Check for ILogger<T> injection in services and middleware. Look for structured
      message templates with named placeholders like {Id}, {Name} vs string interpolation
      $"...". Check log level usage (LogInformation, LogWarning, LogError). Note if
      high-performance [LoggerMessage] source generators are used. Verify that sensitive
      data is not logged.
    why_it_matters: "Structured logging enables searchable, indexable log entries in production monitoring systems like Application Insights or Seq"
    tier: medium

  - name: "Nullable Reference Types"
    description: "Project-level NRT enforcement and proper null handling"
    what_to_look_for: |
      Check .csproj for <Nullable>enable</Nullable>. Look for proper use of ?
      annotations on optional properties and navigation properties. Check for
      null-forgiving operator (!) misuse. Verify required vs optional relationships
      are annotated correctly on entity models.
    why_it_matters: "NRT catches null reference bugs at compile time and documents API contracts for nullability"
    tier: medium

  - name: "API Documentation"
    description: "OpenAPI endpoint metadata including descriptions, response types, and parameter documentation"
    what_to_look_for: |
      Check for .WithName(), .WithSummary(), .WithDescription(), .WithTags() on endpoint
      definitions. Look for .Produces<T>(), .ProducesValidationProblem(), .ProducesProblem()
      on endpoints - or verify that TypedResults with Results<T1, T2> union types make these
      unnecessary. Check that AddOpenApi()/MapOpenApi() is configured. Verify endpoints are
      grouped logically with descriptive tags.
    why_it_matters: "Rich OpenAPI metadata produces better API documentation and enables high-quality client code generation"
    tier: medium

  - name: "File Organization"
    description: "Clean project structure with logical grouping of files by feature or concern"
    what_to_look_for: |
      Check folder structure: per-entity folders vs per-concern folders. Look at where
      interfaces, DTOs, and middleware files are placed. Check for dedicated Endpoints/
      directory with endpoint extension methods. Verify Program.cs is clean (not a
      monolithic file with all endpoint definitions inline).
    why_it_matters: "Consistent file organization improves discoverability and maintainability in generated code"
    tier: medium

  - name: "HTTP Test File Quality"
    description: "Quality and completeness of .http test files for exercising the API"
    what_to_look_for: |
      Check for .http files covering all CRUD endpoints. Verify request ordering respects
      entity dependencies (parents created before children). Check FK values in POST payloads
      are consistent with creation order. Verify URL paths match actual mapped routes and
      labels accurately describe actions. Check that the file exercises error cases too
      (invalid input, not-found scenarios).
    why_it_matters: "High-quality .http files serve as executable API documentation and catch routing and binding issues during development"
    tier: medium

  - name: "Type Design & Resource Management"
    description: "Proper enum design, return type precision, and IDisposable/IAsyncDisposable patterns"
    what_to_look_for: |
      Check that domain status and type fields use enums instead of magic strings or integers
      (e.g., BookingStatus.Confirmed vs status == "confirmed"). Verify simple enums use
      singular names and enum values have no prefixes. Check that enums are stored correctly
      in EF Core with .HasConversion<string>() when needed. Check service method return types
      for precision: IReadOnlyList<T> vs List<T> vs IEnumerable<T>. Look for modern using
      declarations (using var stream = ...;). Verify HttpClient instances use IHttpClientFactory.
      Check that DbContext instances are not manually disposed when managed by DI.
    why_it_matters: "Well-designed enums enforce type safety; precise return types prevent accidental mutation; proper resource management prevents memory leaks"
    tier: medium

  # ============================================================
  # LOW TIER (weight 0.5x) - Style preferences
  # ============================================================

  - name: "Code Standards Compliance"
    description: "Adherence to .NET naming guidelines and explicit access modifiers"
    what_to_look_for: |
      Check that public types and members use PascalCasing and parameters use camelCasing.
      Verify methods use verb or verb-phrase names (GetBookings, CancelReservation) and
      properties use noun or adjective names (Status, IsActive). Check that async methods
      end with the Async suffix. Verify interfaces use the I prefix (IBookingService).
      Check that all classes, records, interfaces, and enums have explicit access modifiers
      (public, internal) rather than relying on defaults. Look for file-scoped namespace
      declarations (namespace X;) instead of block-scoped (namespace X { }).
    why_it_matters: "Consistent naming and explicit access modifiers following .NET conventions make APIs self-documenting and prevent accidental API surface exposure"
    tier: low
    evaluation_method: hybrid

output:
  directory: output
  reports_directory: reports
  analysis_file: analysis.md
  notes_file: build-notes.md
