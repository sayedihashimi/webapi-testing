name: "ASP.NET Core Razor Pages Skill Evaluation"
description: >
  Evaluate how custom Copilot skills impact the quality of generated
  ASP.NET Core Razor Pages code across three realistic application scenarios.
runs: 1
generation_model: "claude-opus-4.6"

scenarios:
  - name: SparkEvents
    prompt: prompts/scenarios/event-registration.prompt.md
    description: "Event registration portal with ticket types, capacity management, waitlists, and check-in"
  - name: KeystoneProperties
    prompt: prompts/scenarios/property-management.prompt.md
    description: "Property management with leases, tenants, maintenance requests, and rent tracking"
  - name: HorizonHR
    prompt: prompts/scenarios/employee-directory.prompt.md
    description: "Employee directory and HR portal with leave management, reviews, and skills"

configurations:
  - name: no-skills
    label: "Baseline (default Copilot)"
    skills: []
    plugins: []
  - name: dotnet-webapi
    label: "dotnet-webapi skill"
    skills:
      - source: dotnet-webapi
    plugins: []
  - name: dotnet-artisan
    label: "dotnet-artisan plugin chain"
    skills: []
    plugins:
      - source: dotnet-artisan
  - name: managedcode-dotnet-skills
    label: "Community managed-code skills"
    skills:
      - source: managedcode-dotnet-skills
    plugins: []
  - name: dotnet-skills
    label: "Official .NET Skills (dotnet/skills)"
    skills: []
    plugins:
      - source: dotnet-skills
        path: dotnet
      - source: dotnet-skills
        path: dotnet-ai
      - source: dotnet-skills
        path: dotnet-data
      - source: dotnet-skills
        path: dotnet-diag
      - source: dotnet-skills
        path: dotnet-experimental
      - source: dotnet-skills
        path: dotnet-maui
      - source: dotnet-skills
        path: dotnet-msbuild
      - source: dotnet-skills
        path: dotnet-nuget
      - source: dotnet-skills
        path: dotnet-template-engine
      - source: dotnet-skills
        path: dotnet-test
      - source: dotnet-skills
        path: dotnet-upgrade

verification:
  build:
    command: "dotnet build"
    success_pattern: "Build succeeded"
  format:
    command: "dotnet format --check"
  security:
    vulnerability_scan: true
  analyzers:
    - "Meziantou.Analyzer"
  run:
    command: "dotnet run"
    timeout_seconds: 15

dimensions:
  # ============================================================
  # CRITICAL TIER (weight 3x) - Must-have quality gates
  # ============================================================

  - name: "Build & Run Success"
    description: "Whether the generated project compiles without errors and the app starts successfully"
    what_to_look_for: |
      Check if dotnet build completes with zero errors and the success pattern
      "Build succeeded" appears in the output. Check if dotnet run starts the
      app and it remains running for the configured timeout period. Note the
      total number of build warnings as a secondary quality signal.
    why_it_matters: "A project that does not build or run is completely unusable - this is the most fundamental quality gate"
    tier: critical
    evaluation_method: automated

  - name: "Security Vulnerability Scan"
    description: "Known NuGet vulnerabilities and insecure package versions"
    what_to_look_for: |
      Run dotnet list package --vulnerable. Check for packages with known CVEs.
      Check for deprecated packages. Verify no development-only packages are
      included unnecessarily.
    why_it_matters: "Vulnerable dependencies are the most common attack vector in production .NET apps"
    tier: critical
    evaluation_method: automated

  - name: "Input Validation & Guard Clauses"
    description: "Comprehensive form input validation and guard clauses at service boundaries"
    what_to_look_for: |
      Check all form input models for validation attributes ([Required], [StringLength],
      [Range], [RegularExpression]). Verify that ModelState.IsValid is checked in POST
      handlers before processing. Look for client-side validation scripts included
      (_ValidationScriptsPartial). Check that validation errors display properly using
      asp-validation-for and asp-validation-summary. Check constructors and public service
      methods for argument validation using ArgumentNullException.ThrowIfNull(),
      ArgumentException.ThrowIfNullOrEmpty(), or ArgumentOutOfRangeException.ThrowIfNegative().
      Look for fail-fast patterns that validate inputs before performing work.
    why_it_matters: "Missing input validation enables injection attacks, data corruption, and poor user experience; guard clauses catch invalid inputs early at service boundaries"
    tier: critical
    evaluation_method: hybrid

  - name: "NuGet & Package Discipline"
    description: "Exact version pinning and minimal, purposeful NuGet package selection"
    what_to_look_for: |
      Check .csproj files for PackageReference elements. Every package must have a specific
      version number (e.g., Version="9.0.0"). No package should use Version="*" or floating
      version ranges - using * is the worst case as it can pull in breaking changes or
      vulnerable releases. Also check for unnecessary packages such as
      Microsoft.AspNetCore.Mvc.Razor.RuntimeCompilation, or packages that duplicate framework
      capabilities. Count total package references vs what is functionally required.
    why_it_matters: "Wildcard versions cause non-reproducible builds and may pull in vulnerable packages; unnecessary dependencies increase attack surface and maintenance burden"
    tier: critical
    evaluation_method: hybrid

  - name: "EF Migration Usage"
    description: "Whether EF Core migrations are used instead of the EnsureCreated anti-pattern"
    what_to_look_for: |
      Check Program.cs for calls to context.Database.EnsureCreated() or
      EnsureCreatedAsync(). This bypasses EF Core migrations and should not
      be used. Instead, the app should use EF Core migrations (dotnet ef
      migrations add, context.Database.Migrate() or MigrateAsync()). Using
      EnsureCreated makes it impossible to evolve the schema safely.
    why_it_matters: "EnsureCreated bypasses migrations, making schema evolution impossible and causing data loss on model changes - migrations are the only production-safe approach"
    tier: critical

  # ============================================================
  # HIGH TIER (weight 2x) - Important best practices
  # ============================================================

  - name: "Business Logic Correctness"
    description: "Whether all specified pages exist and business rules from the specification are correctly implemented"
    what_to_look_for: |
      Compare the list of pages specified in the scenario prompt against the actual Razor
      Pages in the Pages/ directory. Count missing pages and check that CRUD operations
      have corresponding Create/Edit/Delete/Details/Index pages. For each business rule
      in the scenario prompt, check if there is corresponding validation or logic in the
      service or page model layer. Look for boundary checks (capacity limits, date ranges),
      state transition guards (registration states, lease status), constraint enforcement
      (waitlist promotion, rent calculation), and business rule error handling. Note any
      rules or pages completely missing from the implementation.
    why_it_matters: "Business rules and page completeness define the app's purpose - code that compiles but does not implement the specification is functionally incorrect"
    tier: high
    evaluation_method: llm

  - name: "Prefer Built-in over 3rd Party"
    description: "Use of built-in .NET capabilities instead of third-party libraries when equivalent functionality exists"
    what_to_look_for: |
      Check .csproj for Swashbuckle packages - the app should use built-in OpenAPI support
      (AddOpenApi()/MapOpenApi()) if API endpoints exist. Check for Newtonsoft.Json - the app
      should use System.Text.Json unless a specific Newtonsoft feature is required. Check for
      Autofac or other DI containers - the built-in Microsoft.Extensions.DependencyInjection
      should be used. Check for Serilog/NLog - the built-in ILogger<T> infrastructure should
      be the default. Check for AutoMapper - manual mapping or simple extension methods are
      preferred. If the app includes any API endpoints, verify they use Minimal API style
      (MapGet, MapPost, MapGroup) instead of [ApiController] decorated controllers.
    why_it_matters: "The .NET team cannot ship examples using third-party libraries when built-in alternatives exist - this signals outdated practices, adds unnecessary dependencies, and undermines the built-in platform capabilities"
    tier: high

  - name: "Modern C# Adoption"
    description: "Use of modern C# features including primary constructors, collection expressions, and global usings"
    what_to_look_for: |
      Look for class declarations with parameter lists: class MyService(IRepo repo)
      vs traditional private readonly IRepo _repo; public MyService(IRepo repo) { _repo = repo; }.
      Search for collection initialization patterns: modern [] (C# 12) vs
      new List<T>() or new List<T> { ... }. Check for a GlobalUsings.cs file or global using
      statements. Look for repetitive using statements across files that could be centralized.
      Note if implicit usings are enabled in .csproj via <ImplicitUsings>enable</ImplicitUsings>.
      Check for file-scoped namespaces (namespace X;) vs block-scoped (namespace X { }).
      Look for target-typed new expressions (new() instead of new ClassName()).
    why_it_matters: "Modern C# features reduce boilerplate, improve clarity, and signal current language proficiency - critical for .NET team examples"
    tier: high

  - name: "Page Model Design"
    description: "Thin page models with service injection, proper binding, and input model separation"
    what_to_look_for: |
      Check page model classes (*.cshtml.cs). Are they thin (delegating to services) or fat
      (containing business logic and DbContext queries directly)? Look for injected services
      vs inline DbContext. Check for clear OnGet/OnPost handler separation. Verify page models
      use nested InputModel or separate DTO classes for form binding vs [BindProperty] directly
      on entity properties. Check for [BindProperty] public Event Event (anti-pattern) vs
      [BindProperty] public InputModel Input (preferred). Verify entities are never exposed
      directly to views - view models or DTOs should mediate.
    why_it_matters: "Thin page models with input model separation are more testable, prevent over-posting attacks, keep entities clean, and follow single responsibility"
    tier: high

  - name: "Form Handling & Validation"
    description: "Anti-forgery tokens, PRG pattern, named handlers, and validation display"
    what_to_look_for: |
      Check for [ValidateAntiForgeryToken] on POST handlers or global auto-validation via
      AddAntiforgery. Verify form elements include anti-forgery tokens (automatic with asp-page
      tag helper). Check for PRG pattern (OnPost returns RedirectToPage, not Page() on success).
      Look for named handler methods (OnPostSaveAsync, OnPostDeleteAsync) with asp-page-handler
      vs single OnPost with switch/if logic on pages with multiple actions. Check for
      asp-validation-for, asp-validation-summary (ModelOnly vs All), and
      _ValidationScriptsPartial inclusion. Look for TempData success/error messages after
      redirects with consistent Bootstrap alert rendering.
    why_it_matters: "Proper form handling prevents CSRF attacks (OWASP Top 10), duplicate submissions, and over-posting; named handlers produce cleaner, more testable page models"
    tier: high

  - name: "Error Handling Strategy"
    description: "Exception handling, error pages, and consistent error display across the application"
    what_to_look_for: |
      Look for custom exception classes. Check for IExceptionHandler middleware vs default
      error page only. Check how business rule violations are communicated from services to
      page models. Look for StatusCodePagesWithReExecute configuration. Check that validation
      errors are displayed consistently using asp-validation-summary and asp-validation-for.
      Verify TempData error messages use consistent styling (Bootstrap alerts with role="alert").
      Check that server errors show a user-friendly error page.
    why_it_matters: "Well-designed exception handling makes errors consistent, debuggable, and provides good user experience with accessible error display"
    tier: high

  - name: "Async Patterns & Cancellation"
    description: "Correct async/await patterns and CancellationToken propagation through all layers"
    what_to_look_for: |
      Check that all async methods have the Async suffix (GetBookingsAsync, not GetBookings).
      Look for async void methods (should be async Task except for event handlers). Check for
      sync-over-async anti-patterns (Task.Result, .Wait(), .GetAwaiter().GetResult()). Verify
      that async page handlers use await consistently through the call chain. Check page model
      handlers for CancellationToken parameters. Trace the token through service methods to
      EF Core calls (ToListAsync, SaveChangesAsync). Count methods with vs without CancellationToken.
    why_it_matters: "Proper async patterns prevent deadlocks and thread pool starvation; CancellationToken propagation prevents wasted server resources on cancelled requests"
    tier: high

  - name: "EF Core Best Practices"
    description: "Explicit relationship configuration, AsNoTracking for reads, and proper DbContext usage"
    what_to_look_for: |
      Check for Fluent API relationship configuration vs convention-only. Look for explicit
      cascade delete behavior, required vs optional relationships, and composite keys. Note
      if IEntityTypeConfiguration<T> is used for clean separation of entity configs from
      OnModelCreating. Search for .AsNoTracking() in service files and check if read-only
      queries (OnGet handlers) consistently use it. Count total read queries vs those using
      AsNoTracking. Verify DbContext lifetime is managed by DI (not manually disposed).
    why_it_matters: "Explicit relationship configuration prevents surprise cascade behaviors; AsNoTracking doubles performance on read queries; proper DbContext usage prevents connection leaks"
    tier: high

  - name: "Security Configuration"
    description: "HSTS, HTTPS redirection, anti-forgery enforcement, and security headers"
    what_to_look_for: |
      Check Program.cs for proper HTTPS enforcement. In non-development environments,
      the app should call app.UseHsts() and app.UseHttpsRedirection(). Look for the
      standard pattern: if (!app.Environment.IsDevelopment()) { app.UseHsts(); }
      followed by app.UseHttpsRedirection(). Verify HSTS is not called unconditionally.
      Check that anti-forgery tokens are enforced globally or on every POST handler.
      Look for security-related middleware ordering.
    why_it_matters: "HSTS and HTTPS protect against man-in-the-middle attacks; anti-forgery tokens prevent CSRF (OWASP Top 10); correct middleware ordering is essential for security"
    tier: high

  # ============================================================
  # MEDIUM TIER (weight 1x) - Good practices
  # ============================================================

  - name: "Service Abstraction & DI"
    description: "Interface-based services with proper dependency injection registration"
    what_to_look_for: |
      Check DI registration: AddScoped<IService, Service>() vs AddScoped<Service>().
      Look for interface files and their organization. Check that services follow single
      responsibility - one service per domain area rather than a single monolithic service.
      Verify DI lifetimes are appropriate (Scoped for DbContext-dependent services).
      Check that services receive dependencies through constructor injection.
    why_it_matters: "Interface-based registration enables testability, follows dependency inversion, and is the standard .NET DI pattern"
    tier: medium

  - name: "UI Quality & Accessibility"
    description: "Semantic HTML, ARIA attributes, Bootstrap integration, responsive design, and null/empty state handling"
    what_to_look_for: |
      Check .cshtml files for semantic elements: <nav>, <main>, <section>, <article>,
      <header>/<footer>, <button> for actions (not <a> styled as button), <table> with
      <thead>/<tbody>, <label> associated with inputs via asp-for. Check for ARIA attributes:
      role="alert" on flash messages, aria-label on navigation, aria-describedby linking
      inputs to validation messages, aria-current="page" on active nav items. Check for
      responsive Bootstrap grid (container, row, col-md-*), proper form classes (form-control,
      form-label), table classes (table-striped, table-hover), button variants, alert with
      proper dismiss. Check for null/empty collection guards and "No items found" messages.
      Look for organized CSS (site.css or page-specific) vs inline style="" attributes.
    why_it_matters: "Semantic HTML improves accessibility and SEO; ARIA attributes support screen readers (WCAG compliance); Bootstrap integration produces professional, responsive UI; proper empty states prevent NullReferenceExceptions"
    tier: medium

  - name: "Reusable UI Components"
    description: "ViewComponents, tag helpers, partial views, and layout hierarchy for DRY UI patterns"
    what_to_look_for: |
      Look for ViewComponent classes (inheriting from ViewComponent) for reusable widgets like
      status badges, dashboard cards, or pagination. Check for <vc:*> tag helper invocations.
      Look for meaningful partial views (<partial name="..." />) for repeated UI patterns vs
      duplicated markup. Check for custom TagHelper classes in a TagHelpers/ folder for repeated
      patterns. Check _ViewImports.cshtml for @addTagHelper registrations. Verify proper use of
      asp-for, asp-items, asp-page, asp-route-* tag helpers. Check for _Layout.cshtml,
      _ViewStart.cshtml, _ViewImports.cshtml hierarchy. Look for @section Scripts for
      page-specific JS and _ValidationScriptsPartial inclusion in form pages.
    why_it_matters: "Component composition reduces duplication, improves testability, and follows DRY; proper layout hierarchy and tag helpers are the Razor-idiomatic way to build maintainable UI"
    tier: medium

  - name: "Data Seeder Design"
    description: "Seed data strategy with realistic, varied data for development and testing"
    what_to_look_for: |
      Check how seed data is created: HasData() in OnModelCreating, static seeder methods
      called from Program.cs, or injectable seeder services. Verify seed data includes
      realistic variety (different states, edge cases, enough records to demonstrate
      pagination). Check for idempotency guards (AnyAsync check) and logging during seeding.
    why_it_matters: "HasData() integrates with migrations for reproducible state; realistic seed data demonstrates the app's full capabilities"
    tier: medium

  - name: "Structured Logging"
    description: "ILogger<T> with structured message templates and proper log levels"
    what_to_look_for: |
      Check for ILogger<T> injection in services, page models, and middleware. Look for
      structured message templates with named placeholders like {Id}, {Name} vs string
      interpolation $"...". Check log level usage (LogInformation, LogWarning, LogError).
      Note if high-performance [LoggerMessage] source generators are used.
    why_it_matters: "Structured logging enables searchable, indexable log entries in production monitoring systems like Application Insights or Seq"
    tier: medium

  - name: "Nullable Reference Types"
    description: "Project-level NRT enforcement and proper null handling"
    what_to_look_for: |
      Check .csproj for <Nullable>enable</Nullable>. Look for proper use of ?
      annotations on optional properties and navigation properties. Check for
      null-forgiving operator (!) misuse. Verify required vs optional relationships
      are annotated correctly on entity models.
    why_it_matters: "NRT catches null reference bugs at compile time and documents API contracts for nullability"
    tier: medium

  - name: "File Organization"
    description: "Feature-based page grouping and clean project structure"
    what_to_look_for: |
      Check folder structure: Pages organized by feature area (Pages/Events/,
      Pages/Attendees/) or flat? Services in dedicated Services/ folder?
      Models with separate Enums/ subfolder? Middleware in its own folder?
      Check for proper Areas structure if applicable.
    why_it_matters: "Feature-based organization improves discoverability in Razor Pages apps and scales better as apps grow"
    tier: medium

  - name: "Type Design & Resource Management"
    description: "Proper enum design, sealed types, and IDisposable/IAsyncDisposable patterns"
    what_to_look_for: |
      Check that domain status and type fields use enums instead of magic strings or integers
      (e.g., BookingStatus.Confirmed vs status == "confirmed"). Verify simple enums use
      singular names and enum values have no prefixes. Check that enums are stored correctly
      in EF Core with .HasConversion<string>() when needed. Check all class and record
      declarations for the 'sealed' modifier - classes not designed for inheritance should be
      sealed. Look for modern using declarations. Verify HttpClient instances use
      IHttpClientFactory. Check that DbContext instances are not manually disposed when
      managed by DI.
    why_it_matters: "Well-designed enums enforce type safety; sealed types enable JIT optimizations; proper resource management prevents memory leaks and connection exhaustion"
    tier: medium

  # ============================================================
  # LOW TIER (weight 0.5x) - Style preferences
  # ============================================================

  - name: "Code Standards Compliance"
    description: "Adherence to .NET naming guidelines and explicit access modifiers"
    what_to_look_for: |
      Check that public types and members use PascalCasing and parameters use camelCasing.
      Verify methods use verb or verb-phrase names (GetBookings, CancelReservation) and
      properties use noun or adjective names (Status, IsActive). Check that async methods
      end with the Async suffix. Verify interfaces use the I prefix (IBookingService).
      Check that all classes, records, interfaces, and enums have explicit access modifiers
      (public, internal) rather than relying on defaults. Look for file-scoped namespace
      declarations (namespace X;) instead of block-scoped (namespace X { }).
    why_it_matters: "Consistent naming and explicit access modifiers following .NET conventions make APIs self-documenting and prevent accidental API surface exposure"
    tier: low
    evaluation_method: hybrid

output:
  directory: output
  reports_directory: reports
  analysis_file: analysis.md
  notes_file: build-notes.md
